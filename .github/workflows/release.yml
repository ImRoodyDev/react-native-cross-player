name: Release Package

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      dist-tag:
        description: npm dist-tag to publish
        required: true
        default: latest
        type: choice
        options:
          - latest
          - alpha

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NODE_PUBLISH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Test package
        run: npm test -w react-native-cross-player

      - name: Build package
        run: npm run build -w react-native-cross-player

      - name: Publish alpha
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dist-tag == 'alpha' }}
        run: npm run publish:pkg:alpha
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - name: Publish latest
        if: ${{ github.event_name == 'release' || inputs.dist-tag == 'latest' }}
        run: npm run publish:pkg:latest
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
